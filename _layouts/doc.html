<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} #{{ site.data.version.commit_number }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Source+Code+Pro:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/fonts/dejavu-sans-mono.css">
  <link rel="stylesheet" href="/assets/css/doc.css">
</head>
<body>
<main>
{{ content }}
</main>
<script>
// Inject build number after first "Royal Jelly" occurrence in the page body.
// The number is embedded in <title> by Jekyll; this keeps README.md clean.
(function() {
  var m = document.title.match(/#(\d+)/);
  if (!m) return;
  var build = '#' + m[1];
  var els = document.querySelectorAll('strong, h1, h2, p');
  for (var i = 0; i < els.length; i++) {
    var el = els[i];
    if (el.childNodes.length === 1 && el.firstChild.nodeType === 3 &&
        el.firstChild.textContent.includes('Royal Jelly')) {
      el.firstChild.textContent = el.firstChild.textContent.replace(
        'Royal Jelly', 'Royal Jelly ' + build);
      break;
    }
  }
})();

// Update data-stat spans with live stats from version.yml.
(function() {
  var v = {{ site.data.version | jsonify }};
  if (!v) return;
  // Compute rounded commit count (e.g., 4869 -> "4,800+")
  var cc = Math.floor((v.commit_number || 0) / 100) * 100;
  v.commit_count = cc.toLocaleString() + '+';
  document.querySelectorAll('[data-stat]').forEach(function(el) {
    var key = el.getAttribute('data-stat');
    if (v[key] != null) el.textContent = String(v[key]);
  });
})();

// Link targeting for docs pages (especially when loaded inside the iframe overlay).
// - External links: new tab (_blank)
// - Same-site absolute links (mazesofmenace.net): parent frame (_top)
// - Relative links to game pages (hack/, rogue/, or root /): parent frame (_top)
// - Other relative links (docs, anchors): stay in iframe (default)
(function() {
  var siteHost = 'mazesofmenace.net';
  var inIframe = (window !== window.top);
  document.querySelectorAll('a[href]').forEach(function(a) {
    var href = a.getAttribute('href');
    if (!href) return;
    if (href.startsWith('http://') || href.startsWith('https://')) {
      try {
        var url = new URL(href);
        if (url.hostname === siteHost || url.hostname === 'www.' + siteHost) {
          a.setAttribute('target', '_top');
        } else {
          a.setAttribute('target', '_blank');
          a.setAttribute('rel', 'noopener noreferrer');
        }
      } catch(e) {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      }
    } else if (inIframe && /^(hack|rogue)(\/|$)/.test(href)) {
      // Game page links should navigate the parent, not load inside the iframe
      a.setAttribute('target', '_top');
    }
  });
})();
</script>
</body>
</html>
