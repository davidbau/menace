<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spacewar! (1962) -- Mazes of Menace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="preload" href="../assets/fonts/DejaVuSansMono-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../assets/fonts/dejavu-sans-mono.css">
  <style>
    :root {
      --color-bg: #000;
      --color-terminal-bg: #000;
      --color-terminal-border: #1a1a1a;
      --color-accent: #33ff33;
      --font-mono: "DejaVu Sans Mono", "Bitstream Vera Sans Mono", "Liberation Mono", monospace;
      --font-serif: 'EB Garamond', Georgia, serif;
      --game-font-size: 16px;
      --game-line-height: 1.1875;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #33ff33;
      font-family: var(--font-serif);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #page {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    #spacewar-container {
      position: relative;
      display: inline-block;
      background: #000;
      border: 2px solid #1a3a1a;
      border-radius: 8px;
      overflow: hidden;
    }

    /* Terminal text renders on top of canvas */
    #spacewar-container pre {
      position: relative;
      z-index: 1;
      background: transparent !important;
      color: #33ff33;
    }

    #spacewar-canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 4px;
      z-index: 10;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }

    #controls button {
      background: #111;
      border: 1px solid #333;
      color: #33ff33;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    #controls button:hover {
      background: #1a3a1a;
    }
  </style>
</head>
<body>
  <div id="page">
    <div id="spacewar-container">
      <canvas id="spacewar-canvas" width="1024" height="608"></canvas>
    </div>
  </div>

  <div id="controls">
    <button id="font-smaller" title="Decrease font size"><span style="font-family:var(--font-mono)">A</span>&minus;</button>
    <button id="font-larger" title="Increase font size"><span style="font-family:var(--font-mono)">A</span>+</button>
    <button id="btn-shell" title="Return to shell">&#x23CE; Shell</button>
  </div>

  <script>
  /* Line-height pre-computation (same as shell/logo) */
  (function() {
    var FONT_FAMILY = '"DejaVu Sans Mono", "Bitstream Vera Sans Mono", "Liberation Mono", monospace';
    function measureLineHeight(fontSize) {
      try {
        var canvas = document.createElement('canvas');
        var ctx = canvas.getContext('2d');
        if (!ctx) return Math.round(fontSize * 1.1875);
        ctx.font = fontSize + 'px ' + FONT_FAMILY;
        var m = ctx.measureText('M');
        if (m.fontBoundingBoxAscent !== undefined && m.fontBoundingBoxDescent !== undefined) {
          return Math.floor(m.fontBoundingBoxAscent + m.fontBoundingBoxDescent);
        }
        return Math.round(fontSize * 1.1875);
      } catch(e) { return Math.round(fontSize * 1.1875); }
    }
    function applyLineHeight() {
      var sz = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--game-font-size')) || 16;
      var lh = measureLineHeight(sz);
      document.documentElement.style.setProperty('--game-line-height', (lh / sz).toFixed(4));
    }
    window._applyLineHeight = applyLineHeight;
    applyLineHeight();
  })();
  </script>

  <script type="module">
    import { Terminal } from '../js/terminal.js';
    import { SpacewarGame } from './js/spacewar.js';

    const container = document.getElementById('spacewar-container');
    const canvas = document.getElementById('spacewar-canvas');

    // Detach canvas before Terminal clears innerHTML, then re-add behind <pre>
    if (canvas) canvas.remove();
    const display = new Terminal(container);
    if (canvas) container.insertBefore(canvas, container.firstChild);

    // Make terminal text transparent-background so canvas shows through
    const pre = display.getPreElement();
    if (pre) pre.style.background = 'transparent';

    // Size canvas to match the terminal <pre> exactly
    function sizeCanvas() {
      if (!pre) return;
      const preRect = pre.getBoundingClientRect();
      const contRect = container.getBoundingClientRect();
      // Position canvas under the <pre>
      canvas.style.left = (preRect.left - contRect.left) + 'px';
      canvas.style.top = (preRect.top - contRect.top) + 'px';
      canvas.style.width = preRect.width + 'px';
      canvas.style.height = preRect.height + 'px';
      // High-res canvas: 1024 wide, height proportional
      canvas.width = 1024;
      canvas.height = Math.round(1024 * (preRect.height / preRect.width));
    }
    requestAnimationFrame(() => {
      sizeCanvas();
      window.addEventListener('resize', sizeCanvas);
    });

    // Font size controls
    function currentSize() {
      try { return parseInt(localStorage.getItem('menace-font-size')) || 16; } catch(e) { return 16; }
    }
    function setFontSize(sz) {
      sz = Math.max(10, Math.min(28, sz));
      document.documentElement.style.setProperty('--game-font-size', sz + 'px');
      container.style.fontSize = sz + 'px';
      try { localStorage.setItem('menace-font-size', String(sz)); } catch(e) {}
      if (window._applyLineHeight) window._applyLineHeight();
      requestAnimationFrame(sizeCanvas);
    }
    document.getElementById('font-smaller').addEventListener('click', () => setFontSize(currentSize() - 1));
    document.getElementById('font-larger').addEventListener('click', () => setFontSize(currentSize() + 1));

    // Apply saved font size
    const savedSize = currentSize();
    if (savedSize !== 16) setFontSize(savedSize);

    // Title screen — center every line in 80 columns
    function ctr(row, text, color) {
      display.putstr(Math.floor((80 - text.length) / 2), row, text, color);
    }
    display.clearScreen();
    ctr(10, 'S P A C E W A R !', 10);
    ctr(12, 'MIT 1962', 7);
    ctr(15, 'PRESS SPACE TO START', 10);
    ctr(18, 'NEEDLE: A/D W S Q   WEDGE: arrows . /', 7);
    ctr(19, 'P pause  ESC quit', 7);
    if (typeof display.flush === 'function') display.flush();

    async function waitForSpace() {
      return new Promise(resolve => {
        function onKey(e) {
          if (e.code === 'Space') {
            e.preventDefault();
            document.removeEventListener('keydown', onKey);
            resolve();
          }
        }
        document.addEventListener('keydown', onKey);
      });
    }

    async function main() {
      await waitForSpace();

      while (true) {
        sizeCanvas();
        const game = new SpacewarGame(canvas, display);
        await game.run();
        break; // ESC pressed — exit to shell
      }

      // Return to shell
      try {
        localStorage.setItem('menace-shell-context', JSON.stringify({ app: 'spacewar' }));
      } catch (e) {}
      window.location.href = '/shell/';
    }

    // Shell button
    document.getElementById('btn-shell').addEventListener('click', () => {
      try {
        localStorage.setItem('menace-shell-context', JSON.stringify({ app: 'spacewar' }));
      } catch (e) {}
      window.location.href = '/shell/';
    });

    main();
  </script>
</body>
</html>
